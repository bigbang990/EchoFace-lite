services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  dashboard:
    build: .
    command: ["streamlit", "run", "dashboard/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      ECOFACE_API_BASE: http://api:8000/api/v1
    depends_on:
      - api
    volumes:
      - ./data:/app/data
